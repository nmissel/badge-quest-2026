<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2860E0"/>
      <stop offset="100%" stop-color="#0C2478"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#C87000"/>
    </linearGradient>
  </defs>

  <!-- Background (rounded for maskable safe zone) -->
  <rect width="512" height="512" rx="90" ry="90" fill="url(#bg)"/>
  <!-- Subtle top gloss -->
  <rect width="512" height="180" rx="90" ry="90" fill="white" opacity="0.07"/>

  <!-- Outer target ring — white -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="white" stroke-width="20"/>
  <!-- Middle ring — gold -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="url(#gold)" stroke-width="20"/>
  <!-- Bull's-eye — gold -->
  <circle cx="256" cy="256" r="44" fill="url(#gold)"/>
  <circle cx="256" cy="256" r="44" fill="none" stroke="white" stroke-width="10"/>

  <!-- Crosshair lines — white, outside outer ring -->
  <line x1="256" y1="68"  x2="256" y2="148" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="364" x2="256" y2="444" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="68"  y1="256" x2="148" y2="256" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="364" y1="256" x2="444" y2="256" stroke="white" stroke-width="16" stroke-linecap="round"/>
</svg>
